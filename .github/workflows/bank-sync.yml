
name: Bank Sync

on:
  repository_dispatch:
    types: [bank-sync]
  workflow_dispatch:
    inputs:
      userId:
        description: Firebase User ID
        required: true
      companyId:
        description: Bank company ID
        required: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Install dependencies
        run: |
          cd scripts/bank-sync
          npm install

      - name: Run bank scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_VPLUS_PRO }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          PUPPETEER_EXECUTABLE_PATH: "/usr/bin/chromium-browser"
          USER_ID: ${{ github.event.client_payload.userId }}
          COMPANY_ID: ${{ github.event.client_payload.companyId }}
          USERNAME: ${{ github.event.client_payload.username }}
          PASSWORD: ${{ github.event.client_payload.password }}
          USER_CODE: ${{ github.event.client_payload.userCode }}
          ID_NUMBER: ${{ github.event.client_payload.id }}
          BRANCH_NUMBER: ${{ github.event.client_payload.num }}
          JOB_ID: ${{ github.event.client_payload.jobId }}
        run: |
          cd scripts/bank-sync
          node scraper.js


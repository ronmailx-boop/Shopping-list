name: Bank Sync

on:
  repository_dispatch:
    types: [bank-sync]
  workflow_dispatch:
    inputs:
      userId:
        description: Firebase User ID
        required: true
      companyId:
        description: Bank company ID
        required: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Install dependencies
        run: |
          cd scripts/bank-sync
          npm install

      - name: Patch max scraper - add missing transaction types
        run: |
          cd scripts/bank-sync
          node << 'EOF'
          const { readFileSync, writeFileSync } = require('fs');
          const { execSync } = require('child_process');

          const result = execSync('find node_modules/israeli-bank-scrapers -name "max.js"').toString().trim();
          console.log('max files found:', result);
          const files = result.split('\n').filter(Boolean);
          let patched = 0;

          for (const filePath of files) {
            let content = readFileSync(filePath, 'utf8');
            if (!content.includes('Unknown transaction type')) {
              console.log(filePath + ' -- no throw found, skipping');
              continue;
            }
            const before = content;
            // Replace throw with warn so unknown types dont crash
            content = content.replace(
              /throw new Error\([^)]*Unknown transaction type[^)]*\)/g,
              "console.warn('Unknown transaction type -- treating as normal')"
            );
            if (content !== before) {
              writeFileSync(filePath, content, 'utf8');
              console.log('patched: ' + filePath);
              patched++;
            } else {
              console.log('WARNING: could not patch ' + filePath);
              // Print relevant lines for debugging
              content.split('\n').forEach((l, i) => {
                if (l.includes('transaction type') || l.includes('transactionType')) {
                  console.log('  line ' + (i+1) + ': ' + l.trim());
                }
              });
            }
          }
          console.log('Total patched: ' + patched);
          EOF

      - name: Run bank scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_VPLUS_PRO }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          PUPPETEER_EXECUTABLE_PATH: "/usr/bin/chromium-browser"
          USER_ID: ${{ github.event.client_payload.userId }}
          COMPANY_ID: ${{ github.event.client_payload.companyId }}
          USERNAME: ${{ github.event.client_payload.username }}
          PASSWORD: ${{ github.event.client_payload.password }}
          USER_CODE: ${{ github.event.client_payload.userCode }}
          ID_NUMBER: ${{ github.event.client_payload.id }}
          BRANCH_NUMBER: ${{ github.event.client_payload.num }}
          JOB_ID: ${{ github.event.client_payload.jobId }}
        run: |
          cd scripts/bank-sync
          node scraper.js